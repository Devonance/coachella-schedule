// Parse raw data into objects
function parsePerformers(raw, day) {
  return raw.map(([name, stage, start, end, genre, spotifyId, headliner, setlist], i) => ({
    id: `${day}-${i}`,
    name, stage, startTime: start, endTime: end, genre, spotifyId, isHeadliner: headliner, setlist, day,
    startMin: timeToMin(start), endMin: timeToMin(end),
  }));
}

function timeToMin(t) {
  const [h, m] = t.split(":").map(Number);
  return h < 6 ? (h + 24) * 60 + m : h * 60 + m;
}
function minToTime(m) {
  const h = Math.floor(m / 60) % 24;
  const mi = m % 60;
  const ampm = h >= 12 ? "PM" : "AM";
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${h12}:${String(mi).padStart(2, "0")} ${ampm}`;
}
function fmtTime(t) { return minToTime(timeToMin(t)); }

    return performers.map(p => ({ ...p, dimmed: !activeGenres.has(p.genre) }));
  }, [performers, activeGenres]);

  const toggleGenre = (g) => {
    setActiveGenres(prev => {
      const next = new Set(prev);
      next.has(g) ? next.delete(g) : next.add(g);
      return next;
    });
  };

  const addToPlan = useCallback((perf) => {
    setPlan(prev => {
      const day = prev[perf.day];
      if (day.find(p => p.id === perf.id)) return prev;
      return { ...prev, [perf.day]: [...day, perf].sort((a, b) => a.startMin - b.startMin) };
    });
  }, []);

  const removeFromPlan = useCallback((perf) => {
    setPlan(prev => ({
      ...prev, [perf.day]: prev[perf.day].filter(p => p.id !== perf.id)
    }));
  }, []);

  const isPlanned = (p) => currentPlan.some(x => x.id === p.id);

  // Conflict detection
  const conflicts = useMemo(() => {
    const c = [];
    for (let i = 0; i < currentPlan.length; i++) {
      for (let j = i + 1; j < currentPlan.length; j++) {
        const a = currentPlan[i], b = currentPlan[j];
        const walk = getWalk(a.stage, b.stage);
        if (a.startMin < b.endMin && b.startMin < a.endMin) {
          const overlap = Math.min(a.endMin, b.endMin) - Math.max(a.startMin, b.startMin);
          c.push({ a, b, type: "overlap", overlap, walk });
        } else if (b.startMin - a.endMin < walk && b.startMin > a.startMin) {
          c.push({ a, b, type: "walking", gap: b.startMin - a.endMin, walk });
        }
      }
    }
    return c;
  }, [currentPlan]);

  const hasConflict = (p) => conflicts.some(c => c.a.id === p.id || c.b.id === p.id);

                    </div>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#1DB954">
                      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                    </svg>
                  </a>
                ))}
              </div>
              <button onClick={() => setShowHeineken(false)} style={{
                position: "absolute", top: 16, right: 16, background: "none",
                border: "none", fontSize: 24, cursor: "pointer", color: "var(--brown)"
              }}>✕</button>
            </div>
          </div>
        )}

        {/* ── ARTIST MODAL ── */}
        {selectedArtist && (
          <div style={{
            position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
            background: "rgba(0,0,0,0.6)", zIndex: 200, display: "flex",
            alignItems: "center", justifyContent: "center", padding: 20
          }} onClick={() => setSelectedArtist(null)}>
            <div onClick={e => e.stopPropagation()} style={{
              background: "var(--card)", borderRadius: 16, maxWidth: 480, width: "100%",
              maxHeight: "85vh", overflowY: "auto", position: "relative"
            }}>
              {/* Genre accent bar */}
              <div style={{
                height: 6, borderRadius: "16px 16px 0 0",
                background: GENRES[selectedArtist.genre]?.color || "#888"
              }} />
              <div style={{ padding: "20px 24px 24px" }}>
                {/* Header */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    {selectedArtist.isHeadliner && (
                      <span style={{
                        fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1,
                        color: "var(--terra)", marginBottom: 4, display: "block"
                      }}>★ Headliner</span>
                    )}
                    <h2 className="playfair" style={{ fontSize: 26, fontWeight: 900, lineHeight: 1.1 }}>
                      {selectedArtist.name}
                    </h2>
                  </div>
                  <button onClick={() => setSelectedArtist(null)} style={{
                    background: "none", border: "none", fontSize: 24, cursor: "pointer", color: "var(--brown)", padding: 4
                  }}>✕</button>
                </div>

                {/* Stage & time */}
                <div style={{ marginTop: 12, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{
                    background: STAGES[selectedArtist.stage]?.color, color: "#fff",
                    padding: "3px 10px", borderRadius: 4, fontSize: 12, fontWeight: 600
                  }}>{STAGES[selectedArtist.stage]?.name}</span>
                  <span className="mono" style={{ fontSize: 14, fontWeight: 600 }}>
                    {fmtTime(selectedArtist.startTime)} – {fmtTime(selectedArtist.endTime)}
                  </span>
                  <span style={{
                    background: GENRES[selectedArtist.genre]?.color, color: "#fff",
                    padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 600
                  }}>{GENRES[selectedArtist.genre]?.label}</span>
                </div>

                {/* Duration */}
                <p style={{ fontSize: 12, color: "var(--brown)", marginTop: 8 }}>
                  Set length: {selectedArtist.endMin - selectedArtist.startMin} minutes
                </p>

                {/* Spotify */}
                <a href={spotifyUrl(selectedArtist.spotifyId, selectedArtist.name)}
                  target="_blank" rel="noopener noreferrer"
                  style={{
                    display: "inline-flex", alignItems: "center", gap: 8,
                    background: "#1DB954", color: "#fff", padding: "10px 20px",
                    borderRadius: 24, fontSize: 14, fontWeight: 700, marginTop: 16,
                    textDecoration: "none", fontFamily: "'DM Sans'"
                  }}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                  </svg>
                  Listen on Spotify
                </a>

                {/* Artist-specific notices */}
                {NOTICES.filter(n => n.artist === selectedArtist.name).map((n, i) => (
                  <div key={i} style={{
                    marginTop: 12, background: n.type === "canceled" ? "#FFF0F0" : "rgba(242,204,143,0.2)",
                    borderRadius: 8, padding: "10px 14px",
                    border: `1px solid ${n.type === "canceled" ? "rgba(230,57,70,0.2)" : "rgba(242,204,143,0.4)"}`
                  }}>
                    <div style={{
                      fontSize: 12, fontWeight: 600,
                      color: n.type === "canceled" ? "var(--red)" : "#8B6914"
                    }}>
                      {n.type === "canceled" ? "✕ " : "⚠ "}{n.text}
                    </div>
                  </div>
                ))}

                {/* Guest appearances */}
                {GUEST_APPEARANCES[selectedArtist.name] && (
                  <div style={{ marginTop: 16 }}>
                    <h4 style={{ fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: "var(--brown)", marginBottom: 6 }}>
                      Guest Appearances (Weekend 1)
                    </h4>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {GUEST_APPEARANCES[selectedArtist.name].map((g, i) => (
                        <span key={i} style={{
                          background: "rgba(242,204,143,0.2)", border: "1px solid rgba(242,204,143,0.4)",
                          borderRadius: 16, padding: "3px 10px", fontSize: 12, color: "var(--text)", fontWeight: 500
                        }}>{g}</span>
                      ))}
                    </div>
                    <p style={{ fontSize: 10, color: "var(--brown)", marginTop: 4, fontStyle: "italic" }}>
                      May or may not repeat for Weekend 2
                    </p>
                  </div>
                )}

                {/* Setlist */}
                {selectedArtist.setlist && selectedArtist.setlist.length > 0 && (
                  <div style={{ marginTop: 20 }}>
                    <h4 style={{ fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: "var(--brown)", marginBottom: 8 }}>
                      Setlist (from Weekend 1)
                    </h4>
                    <div style={{
                      background: "rgba(0,0,0,0.03)", borderRadius: 8, padding: 12
                    }}>
                      {selectedArtist.setlist.map((song, i) => (
                        <div key={i} style={{
                          fontSize: 12, padding: "3px 0",
                          borderBottom: i < selectedArtist.setlist.length - 1 ? "1px solid rgba(0,0,0,0.05)" : "none",
                          display: "flex", gap: 8
                        }}>
                          <span className="mono" style={{ color: "var(--brown)", fontSize: 11, minWidth: 20, textAlign: "right" }}>{i + 1}</span>
                          <span>{song}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Conflict check */}
                {isPlanned(selectedArtist) && hasConflict(selectedArtist) && (
                  <div style={{
                    marginTop: 16, background: "#FFF0F0", borderRadius: 8, padding: 12,
                    border: "1px solid rgba(230,57,70,0.2)"
                  }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--red)" }}>⚠ Schedule Conflict</div>
                    {conflicts.filter(c => c.a.id === selectedArtist.id || c.b.id === selectedArtist.id).map((c, i) => {
                      const other = c.a.id === selectedArtist.id ? c.b : c.a;
                      return (
                        <div key={i} style={{ fontSize: 11, color: "#8B0000", marginTop: 4 }}>
                          {c.type === "overlap"
                            ? `Overlaps with ${other.name} by ${c.overlap} min`
                            : `Only ${c.gap} min gap to reach ${other.name} (~${c.walk} min walk needed)`
                          }
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Add/Remove button */}
                <button
                  onClick={() => {
                    isPlanned(selectedArtist) ? removeFromPlan(selectedArtist) : addToPlan(selectedArtist);
                  }}
                  style={{
                    width: "100%", padding: "12px", borderRadius: 8, border: "none",
                    cursor: "pointer", fontSize: 14, fontWeight: 700, marginTop: 20,
                    fontFamily: "'DM Sans'",
                    background: isPlanned(selectedArtist) ? "rgba(0,0,0,0.05)" : "var(--terra)",
                    color: isPlanned(selectedArtist) ? "var(--brown)" : "#fff",
                  }}>
                  {isPlanned(selectedArtist) ? "✕ Remove from Plan" : "＋ Add to My Plan"}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Bottom spacer for scrubber */}
        <div style={{ height: 100 }} />
      </div>
    </>
  );
}

// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
// Hide loading screen
setTimeout(() => {
  const el = document.getElementById('loading');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }
}, 100);
  </script>
</body>
</html>
